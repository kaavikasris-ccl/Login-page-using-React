<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Page</title>
<link rel="stylesheet" href="css/bootstrap.min.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
.input-box {
    position: relative;
}

.input-box .right-icon {
    position: absolute;
    right: 12px;
    top: 50%;
    color: gray;
}
</style>
</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

<div class="bg-white p-4 rounded-4 text-center shadow" style="width:350px;">

    <div class="mb-3">
        <img src="New_crystalcodelabs_logo_CMYK 1.png" alt="Crystal Code Labs" style="width: 120px;">
    </div>

    <h4 class="mb-2">Welcome Back</h4>
    <p class="text-muted small mb-3">Please enter your details</p>

    <form>
        <div class="form-floating mb-3 position-relative">

            <i class="fa fa-envelope position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>

            <input type="email" class="form-control ps-5 pe-5 rounded-3"
                   id="email" placeholder="Email Address"
                   value="cclemployee@zohomail.com">

            <label for="email" class="ps-5">Email Address</label>

            <i class="fa fa-check-circle text-success position-absolute top-50 end-0 translate-middle-y me-3"></i>
        </div>
        <div class="mb-3 text-start">
            <label class="mb-2">Password</label>

            <div class="input-box">
                <input type="password" class="form-control rounded-3 pe-5" value="password">
                <i class="fa fa-eye right-icon"></i>
            </div>
        </div>
        <button class="btn btn-primary w-100 rounded-3">Continue</button>

    </form>
</div>

<div class="col-md-6 right-side d-flex justify-content-center align-items-center">
    <img src="Group 1 (1).png" class="img-fluid" alt="login image">
</div>

</body>
</html>
