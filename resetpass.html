<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Page</title>
<link rel="stylesheet" href="css/bootstrap.min.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
.input-box {
    position: relative;
}
</style>
</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

<div class="bg-white p-4 rounded-4 text-center shadow" style="width: 350px;">

    <div class="mb-3">
        <img src="New_crystalcodelabs_logo_CMYK 1.png" alt="Crystal Code Labs" style="width: 120px;">
    </div>

    <h4 class="d-flex align-items-center justify-content-center gap-2 mb-3">
        Reset Password ? <i class="fa-solid fa-key text-primary fs-6"></i>
    </h4>

    <form>
        
        <div class="mb-3 text-start">
            <label class="mb-2">New Password</label>
            <div class="input-box">
                <input type="password" class="form-control rounded-3" value="password">
            </div>
        </div>

        <div class="mb-3 text-start">
            <label class="mb-2">Confirm Password</label>
            <div class="input-box">
                <input type="password" class="form-control rounded-3" value="password">
            </div>
        </div>

        <button class="btn btn-primary w-100 rounded-3 py-2 mt-2">Submit</button>
    </form>
</div>

<div class="col-md-6 right-side d-flex justify-content-center align-items-center">
    <img src="reset password.png" class="img-fluid" alt="login image">
</div>

</body>
</html>
